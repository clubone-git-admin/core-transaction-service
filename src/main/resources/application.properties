server.port=8012
spring.application.name=clubone.transaction
spring.threads.virtual.enabled=true
server.tomcat.threads.max=200

# HikariCP (custom clubone datasource — binds via DBConfiguration HikariDataSource)
spring.datasource.clubone.hikari.maximum-pool-size=20
spring.datasource.clubone.hikari.minimum-idle=4
spring.datasource.clubone.hikari.connection-timeout=30000
spring.datasource.clubone.hikari.idle-timeout=600000
spring.datasource.clubone.hikari.max-lifetime=1800000
spring.datasource.clubone.hikari.leak-detection-threshold=60000

# Initial invoice status name (lookup in transactions.lu_invoice_status)
clubone.invoice.initial-status-name=PENDING
# v3 finalize: max |pay amount − invoice total| allowed (currency units, scale handled in code)
clubone.transaction.finalize.amount-tolerance=0.09
# Optional; if unset or blank, partial payments fall back to clubone.invoice.initial-status-name
clubone.transaction.finalize.partially-paid-status-name=PARTIALLY_PAID

# Async GL posting after payment finalize (reconciliation.gl_posting_outbox + gl_entry)
clubone.gl.posting.enabled=true
clubone.gl.posting.poll-interval-ms=30000
clubone.gl.posting.batch-size=20
clubone.gl.posting.max-attempts=10
clubone.gl.posting.retry-delay-seconds=60
# Fallback tenant when locations.levels.application_id is unavailable
# clubone.gl.posting.default-application-id=5949a200-82fb-4171-9001-0f77ac439011
clubone.gl.posting.source-type-code=PAYMENT
clubone.gl.posting.transaction-type-code=PAYMENT_COLLECTION
clubone.gl.posting.journal-type-code=CASH_RECEIPT
clubone.gl.posting.entity-type-code=PAYMENT_TRANSACTION
# Override default billing collection code (default in code is STANDARD if unset)
# clubone.invoice.fallback-billing-collection-type-code=PAID_IN_FULL
spring.profiles.active=test
server.servlet.context-path=/transaction

# Billing vendor — quote line-items (used by v3 finalize when billingQuoteFinalizeSpecs is present)
billing.quote.line-items.url=https://develop-api.clubone.io/vendors/billing/api/quote/line-items
# Vendor POS agreement catalog (HTTP only — purchase snapshot line display_name / entity_version_id)
clubone.vendor.pos-agreement-catalog-url=https://develop-api.clubone.io/vendors/api/pos/agreement/catalog
# billing_config.billing_schedule_status.status_code (e.g. PLANNED, PAID)
clubone.billing.quote.schedule-status-code=PLANNED
# billing_config.billing_status.status_code
clubone.billing.quote.billing-success-status-code=PAID
# When quote billing.frequencyCode is PIF, map to this billing_config.billing_period_unit.code (DAY, WEEK, MONTH, …)
clubone.billing.quote.pif-billing-period-fallback-code=MONTH
# Purchase snapshot (client_subscription_billing.lu_*): stable codes from seed SQL, not UUIDs
clubone.billing.quote.purchase-snapshot-kind-finalize-code=FINALIZE_CHECKOUT
clubone.billing.quote.purchase-snapshot-line-type-fee-code=FEE
clubone.billing.quote.purchase-snapshot-line-type-subscription-code=SUBSCRIPTION
clubone.billing.quote.purchase-snapshot-legal-auto-renewal-code=AUTO_RENEWAL_DISCLOSURE
clubone.billing.quote.purchase-snapshot-legal-min-term-code=MIN_TERM_DISCLOSURE
clubone.billing.quote.purchase-snapshot-legal-default-language-code=en
# Comma-separated item_group_code values treated as fee lines (quote line items)
clubone.billing.quote.fee-item-group-codes=FEE
# When finance tax metadata cannot be resolved for snapshot rows (tax_name NOT NULL)
clubone.billing.quote.purchase-snapshot-tax-fallback-name=Tax
# When quote promotion rows omit cycle_start (NOT NULL on subscription_purchase_snapshot_promo)
clubone.billing.quote.purchase-snapshot-promo-default-cycle-start=1
# Multiple billing quotes with same AGREEMENT entityId → one merged purchase snapshot + ROOT/BUNDLE/leaf lines
clubone.billing.quote.merge-agreement-purchase-snapshot=true
clubone.billing.quote.purchase-snapshot-line-type-root-code=ROOT
clubone.billing.quote.purchase-snapshot-line-type-bundle-code=BUNDLE
# transactions.lu_entity_type.entity_type_id (purchase snapshot line polymorphism)
clubone.billing.quote.snapshot-entity-type-agreement-id=d2dae39c-9cb7-49e2-8143-8104ba48031b
clubone.billing.quote.snapshot-entity-type-bundle-id=be4dfb47-1280-40cf-95c1-84e3cf8caa05
clubone.billing.quote.snapshot-entity-type-item-id=b1c9b95c-5fe0-4062-af85-12ad47908948

#------------------Swagger implementation properties------------------
#The title for the spring boot service to be displayed on swagger UI. It will refer to the above value.
swagger.title=Transaction Service APIs
#The description of the spring boot service. It will refer to the above value.
swagger.description=Invoicing, subscriptions, POS catalog, GL posting, and transaction finalization APIs
#The version of the service. It will refer to the version specified in pom.xml.
swagger.version=V2
#The terms of service url for the service if applicable.
swagger.termsOfServiceUrl=https://www.apache.org/licenses/LICENSE-2.0
#The contact name for the service.
swagger.contact.name=clubone Team
#The contact url for the service
swagger.contact.url=https://www.clubone.com
#The contact email for the service
swagger.contact.email=ask@clubone.com
#The license information about this service
swagger.license=Apache License 2.0
swagger.licenseUrl=https://www.apache.org/licenses/LICENSE-2.0

spring.jpa.properties.hibernate.jdbc.batch_size = 100
spring.jpa.properties.hibernate.order_inserts = true
spring.jpa.properties.hibernate.order_updates = true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data = true
# TRACE binder + hibernate statistics are expensive — enable only for local debug profiles
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
spring.jpa.properties.hibernate.generate_statistics=false

# ===============================
# WhatsApp Notification Templates
# ===============================
whatsapp.template={ \
  EXPIRING_MEMBER_TEMPLATE:'Hi {firstName} {lastName}, your membership is expiring soon. Please renew at {clubName}. Call {supportPhone}.', \
  LEAST_CHECKIN_MEMBER:'Hi {firstName}, we miss you! You visited only {visits} time(s) recently. Come back to {clubName}!', \
  GENERAL:'Hi {firstName}, {message}' \
}
